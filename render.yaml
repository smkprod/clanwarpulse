databases:
  - name: clanwarpulse-db
    databaseName: clanwar_reminder
    user: clanwar_user

services:
  - type: web
    name: clanwarpulse-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: clanwarpulse-db
          property: connectionString
      - key: ClashRoyale__BaseUrl
        value: https://api.clashroyale.com/v1
      - key: ClashRoyale__ApiToken
        sync: false
      - key: Telegram__BotToken
        sync: false
      - key: Telegram__BotUsername
        sync: false
      - key: Telegram__MaxAuthAgeMinutes
        value: "60"
      - key: Worker__PollMinutes
        value: "5"
